<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Barang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">
      <i class="fas fa-boxes mr-2 text-blue-600"></i>Katalog Barang
    </h1>

    <div class="flex flex-col lg:flex-row gap-6">
      <div class="w-full lg:w-1/3">
        <div class="bg-white rounded-lg shadow-md p-6">
          <h2 class="text-xl font-semibold text-gray-700 mb-4" id="formTitle">
            <i class="fas fa-plus-circle mr-2 text-green-500"></i>Tambah Barang
          </h2>
          <form id="itemForm" class="space-y-4">
            <input type="hidden" id="itemId" value="">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">Nama Barang</label>
              <input type="text" id="nama" required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Masukkan nama barang">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">Harga</label>
              <input type="number" id="harga" required min="0"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Masukkan harga">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">Stok</label>
              <input type="number" id="stok" required min="0"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Masukkan jumlah stok">
            </div>
            <div class="flex gap-2">
              <button type="submit" id="submitBtn"
                class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                <i class="fas fa-save mr-1"></i> Simpan
              </button>
              <button type="button" id="cancelBtn" onclick="resetForm()"
                class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition font-medium">
                <i class="fas fa-times mr-1"></i> Batal
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="w-full lg:w-2/3">
        <div class="bg-white rounded-lg shadow-md p-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-700">
              <i class="fas fa-list mr-2 text-blue-500"></i>Daftar Barang
            </h2>
            <button onclick="exportJSON()"
              class="bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700 transition text-sm font-medium">
              <i class="fas fa-download mr-1"></i> Export JSON
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full border-collapse">
              <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                  <th class="py-3 px-4 text-left">No</th>
                  <th class="py-3 px-4 text-left">Nama Barang</th>
                  <th class="py-3 px-4 text-right">Harga</th>
                  <th class="py-3 px-4 text-right">Stok</th>
                  <th class="py-3 px-4 text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="text-gray-700 text-sm"></tbody>
            </table>
            <div id="emptyState" class="text-center py-8 text-gray-400 hidden">
              <i class="fas fa-inbox text-4xl mb-2"></i>
              <p>Belum ada barang. Silakan tambah barang baru.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
