<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h1>
    <form>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-1" for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-medium mb-1" for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">Masuk</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">Belum punya akun? <a href="#" class="text-blue-600 hover:underline">Daftar</a></p>
  </div>
</body>
</html>
